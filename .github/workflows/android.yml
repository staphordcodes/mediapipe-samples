name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x examples/llm_inference/android/gradlew

      - name: Build with Gradle
        run: ./examples/llm_inference/android/gradlew -p examples/llm_inference/android assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urya-ai-app
          path: examples/llm_inference/android/app/build/outputs/apk/debug/*.apk
